<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Terminal - OMON</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
        .header { background: #161b22; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .nav { display: flex; gap: 16px; }
        .nav a { color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px; }
        .nav a.active { background: #21262d; color: #e6edf3; }
        
        .toolbar { background: #161b22; padding: 12px 24px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #30363d; flex-wrap: wrap; }
        .search { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 8px 12px; border-radius: 6px; width: 120px; }
        .btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #2ea043; }
        .btn-secondary { background: #21262d; border: 1px solid #30363d; color: #e6edf3; }
        .btn-secondary:hover { background: #30363d; }
        
        .omain { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        
        .chain-container { display: block; background: #161b22; border-radius: 8px; overflow-x: auto; }
        .chain-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .chain-table th { padding: 8px 2px; background: #21262d; color: #8b949e; position: sticky; top: 0; z-index: 10; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #30363d; }
        .chain-table td { padding: 6px 2px; text-align: right; border-bottom: 1px solid #21262d; }
        .chain-table .strike-cell { background: #0d1117; font-weight: 700; text-align: center; color: #e6edf3; width: 80px; font-size: 13px; }
        .chain-table tr:hover td { background: #21262d; }
        .chain-table .call-side { border-right: 1px solid #30363d; }
        .chain-table .put-side { border-left: 1px solid #30363d; }
        .itm-call { background: rgba(63, 185, 80, 0.05); }
        .itm-put { background: rgba(248, 81, 73, 0.05); }
        .atm-row td { background: rgba(88, 166, 255, 0.15); font-weight: 600; }
        .atm-row .strike-cell { color: #58a6ff; }
        .greek { color: #58a6ff; font-weight: 500; }
        
        .info-bar { background: #161b22; padding: 12px 24px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .info-bar .ticker { font-size: 24px; font-weight: 700; }
        .info-bar .spot { font-size: 24px; }
        .loading { padding: 40px; text-align: center; color: #8b949e; }
        select { background: #0d1117; color: #e6edf3; border: 1px solid #30363d; padding: 6px; border-radius: 4px; }
        
        .watchlist-select { background: #0d1117; color: #e6edf3; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; min-width: 150px; }
        .watchlist-bar { display: flex; align-items: center; gap: 8px; }
        .watchlist-bar label { color: #8b949e; font-size: 12px; }
        .watchlist-edit { display: flex; gap: 8px; margin-left: 12px; }
        .watchlist-edit input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 4px; width: 100px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <h1>🛠️ Alpha Terminal</h1>
            <div class="time" id="time" style="color: #8b949e; font-size: 14px;">--:--:--</div>
        </div>
        <div class="nav" style="display: flex; gap: 16px; margin-left: auto;">
            <a href="dashboard.html" style="color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px;">Dashboard</a>
            <a href="omon.html" class="active" style="background: #21262d; color: #e6edf3; text-decoration: none; padding: 8px 16px; border-radius: 6px;">OMON</a>
            <a href="screener.html" style="color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px;">Option Screener</a>
            <a href="ratio.html" style="color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px;">Ratio Analysis</a>
            <a href="financials.html" style="color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px;">Financial Analyzer</a>
            <a href="estimates.html">Earnings Estimates</a>
        </div>
    </div>
    
    <div class="toolbar">
        <div class="watchlist-bar">
            <label>Watchlist:</label>
            <select id="watchlistSelect" class="watchlist-select" onchange="loadFromWatchlist()">
                <option value="">-- Select --</option>
            </select>
            <button class="btn" onclick="removeFromWatchlist()" style="padding: 6px 10px; font-size: 14px; background: #f85149; color: white; border: none; font-weight: bold;" title="Remove">-</button>
        </div>
        <input type="text" class="search" id="ticker" placeholder="SPY" value="SPY">
        <button class="btn" onclick="fetchExpirations()">Load</button>
        <button class="btn" onclick="addToWatchlist()" style="padding: 8px 12px;" title="Add to Watchlist">+</button>
        <select id="expirySelect" onchange="loadOptions()"></select>
    </div>
    
    <div class="omain">
        <div class="info-bar">
            <div class="ticker" id="qtTicker">SPY</div>
            <div class="spot" id="qtSpot">Spot: --</div>
            <div class="last-trade" id="qtLast" style="font-size:14px;color:#8b949e;">--</div>
            <div id="qtExpiryDisplay" style="font-size:18px;font-weight:600;color:#58a6ff;">--</div>
            <div>
                <label style="color:#8b949e;font-size:12px;">View:</label>
                <select id="viewMode" onchange="renderChain()">
                    <option value="otm">20 OTM (10c/10p)</option>
                    <option value="all">All Strikes</option>
                </select>
            </div>
        </div>
        
        <div class="chain-container" id="chainContainer">
            <div class="loading">Enter ticker and click Load</div>
        </div>
    </div>
    
    <script>
        // Update time
        function updateTime() {
            const now = new Date();
            const timeEl = document.getElementById('time');
            if (timeEl) timeEl.textContent = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        let optionsData = null;
        let spotPrice = 0;
        let watchlist = ['SPY', 'QQQ', 'IWM', 'TLT'];
        try {
            if (localStorage.getItem('omonWatchlist')) {
                watchlist = JSON.parse(localStorage.getItem('omonWatchlist'));
            }
        } catch(e) {}
        
        function saveWatchlist() {
            try { localStorage.setItem('omonWatchlist', JSON.stringify(watchlist)); } catch(e) {}
            renderWatchlist();
        }
        
        function renderWatchlist() {
            const select = document.getElementById('watchlistSelect');
            const tickerEl = document.getElementById('ticker');
            if (!tickerEl) return;
            const current = tickerEl.value.toUpperCase().trim();
            select.innerHTML = '<option value="">-- Select --</option>';
            watchlist.forEach(ticker => {
                const opt = document.createElement('option');
                opt.value = ticker;
                opt.textContent = ticker;
                if (ticker === current) opt.selected = true;
                select.appendChild(opt);
            });
        }
        
        function loadFromWatchlist() {
            const ticker = document.getElementById('watchlistSelect').value;
            if (ticker) {
                document.getElementById('ticker').value = ticker;
                fetchExpirations();
            }
        }
        
        function addToWatchlist() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            if (ticker && !watchlist.includes(ticker)) {
                watchlist.push(ticker);
                watchlist.sort();
                saveWatchlist();
            }
        }
        
        function removeFromWatchlist() {
            const ticker = document.getElementById('watchlistSelect').value;
            if (ticker) {
                const idx = watchlist.indexOf(ticker);
                if (idx > -1) {
                    watchlist.splice(idx, 1);
                    saveWatchlist();
                }
            }
        }
        
        async function fetchExpirations() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            if (!ticker) return;
            renderWatchlist();
            
            try {
                const res = await fetch(`/api/expirations?ticker=${ticker}`);
                const data = await res.json();
                
                const select = document.getElementById('expirySelect');
                select.innerHTML = '';
                
                data.standard.forEach(e => {
                    const opt = document.createElement('option');
                    opt.value = e.date;
                    opt.textContent = e.label;
                    select.appendChild(opt);
                });
                
                if (data.standard.length > 0) {
                    const divider = document.createElement('option');
                    divider.disabled = true;
                    divider.textContent = "──────────";
                    select.appendChild(divider);
                }
                
                data.expirations.forEach(e => {
                    const opt = document.createElement('option');
                    opt.value = e;
                    opt.textContent = e;
                    select.appendChild(opt);
                });
                
                loadOptions();
            } catch (e) {
                console.error(e);
            }
        }
        
        async function loadOptions() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            const expiry = document.getElementById('expirySelect').value;
            if (!ticker || !expiry) return;
            
            document.getElementById('chainContainer').innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const res = await fetch(`/api/options?ticker=${ticker}&expiry=${expiry}`);
                optionsData = await res.json();
                
                spotPrice = optionsData.spot || 0;
                
                document.getElementById('qtTicker').textContent = ticker;
                document.getElementById('qtSpot').textContent = 'Spot: $' + spotPrice.toFixed(2);
                document.getElementById('qtExpiryDisplay').textContent = expiry;
                
                const quoteRes = await fetch(`/api/quotes?tickers=${ticker}`);
                const quoteData = await quoteRes.json();
                const quote = quoteData[ticker];
                if (quote) {
                    const changeSign = quote.change >= 0 ? '+' : '';
                    document.getElementById('qtLast').textContent = 
                        `Last: $${quote.price.toFixed(2)} (${changeSign}${quote.change.toFixed(2)} / ${changeSign}${quote.change_pct.toFixed(2)}%)`;
                }
                
                renderChain();
            } catch (e) {
                console.error('Load error:', e);
                document.getElementById('chainContainer').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
            }
        }
        
        function renderChain() {
            if (!optionsData) return;
            const calls = optionsData.calls || [];
            const puts = optionsData.puts || [];
            const viewMode = document.getElementById('viewMode')?.value || 'otm';
            
            const strikeSet = new Set();
            calls.forEach(c => strikeSet.add(c.strike));
            puts.forEach(p => strikeSet.add(p.strike));
            let sortedStrikes = Array.from(strikeSet).sort((a, b) => a - b);
            
            if (viewMode === 'otm') {
                const callOtm = sortedStrikes.filter(s => s > spotPrice).slice(0, 10);
                const putOtm = sortedStrikes.filter(s => s < spotPrice).reverse().slice(0, 10).reverse();
                sortedStrikes = [...putOtm, ...callOtm];
            }
            
            const callMap = {};
            calls.forEach(c => callMap[c.strike] = c);
            const putMap = {};
            puts.forEach(p => putMap[p.strike] = p);
            
            function fmtNum(n) { return n ? n.toLocaleString() : '-'; }
            function fmtPct(n) { return n ? (n*100).toFixed(1) + '%' : '-'; }
            
            let html = `
                <table class="chain-table">
                    <thead>
                        <tr>
                            <th colspan="10" style="color:#3fb950;border-bottom:2px solid #3fb950;">CALLS</th>
                            <th class="strike-cell">STRIKE</th>
                            <th colspan="10" style="color:#f85149;border-bottom:2px solid #f85149;">PUTS</th>
                        </tr>
                        <tr>
                            <th class="greek">Vega</th><th class="greek">Theta</th><th class="greek">Gamma</th><th class="greek">Delta</th>
                            <th>IV</th><th>OI</th><th>Vol</th><th>Last</th><th>Bid</th><th>Ask</th>
                            <th class="strike-cell">Price</th>
                            <th>Bid</th><th>Ask</th><th>Last</th><th>Vol</th><th>OI</th><th>IV</th>
                            <th class="greek">Delta</th><th class="greek">Gamma</th><th class="greek">Theta</th><th class="greek">Vega</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            // Find ATM strike (closest to spot)
            let atmStrike = null;
            let minDiff = Infinity;
            sortedStrikes.forEach(s => {
                const diff = Math.abs(s - spotPrice);
                if (diff < minDiff) {
                    minDiff = diff;
                    atmStrike = s;
                }
            });

            sortedStrikes.forEach(s => {
                const c = callMap[s] || {};
                const p = putMap[s] || {};
                const c_itm = s < spotPrice ? 'itm-call' : '';
                const p_itm = s > spotPrice ? 'itm-put' : '';
                const isATM = s === atmStrike ? ' atm-row' : '';
                
                html += `
                    <tr class="${isATM}">
                        <td class="call-side ${c_itm} greek">${c.vega?.toFixed(3) || '-'}</td>
                        <td class="call-side ${c_itm} greek">${c.theta?.toFixed(3) || '-'}</td>
                        <td class="call-side ${c_itm} greek">${c.gamma?.toFixed(4) || '-'}</td>
                        <td class="call-side ${c_itm} greek">${c.delta?.toFixed(3) || '-'}</td>
                        <td class="call-side ${c_itm}">${fmtPct(c.iv)}</td>
                        <td class="call-side ${c_itm}">${fmtNum(c.oi)}</td>
                        <td class="call-side ${c_itm}">${fmtNum(c.vol)}</td>
                        <td class="call-side ${c_itm}">${c.last?.toFixed(2) || '-'}</td>
                        <td class="call-side ${c_itm}">${c.bid?.toFixed(2) || '-'}</td>
                        <td class="call-side ${c_itm}">${c.ask?.toFixed(2) || '-'}</td>
                        
                        <td class="strike-cell">${s.toFixed(1)}</td>
                        
                        <td class="put-side ${p_itm}">${p.bid?.toFixed(2) || '-'}</td>
                        <td class="put-side ${p_itm}">${p.ask?.toFixed(2) || '-'}</td>
                        <td class="put-side ${p_itm}">${p.last?.toFixed(2) || '-'}</td>
                        <td class="put-side ${p_itm}">${fmtNum(p.vol)}</td>
                        <td class="put-side ${p_itm}">${fmtNum(p.oi)}</td>
                        <td class="put-side ${p_itm}">${fmtPct(p.iv)}</td>
                        <td class="put-side ${p_itm} greek">${p.delta?.toFixed(3) || '-'}</td>
                        <td class="put-side ${p_itm} greek">${p.gamma?.toFixed(4) || '-'}</td>
                        <td class="put-side ${p_itm} greek">${p.theta?.toFixed(3) || '-'}</td>
                        <td class="put-side ${p_itm} greek">${p.vega?.toFixed(3) || '-'}</td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            document.getElementById('chainContainer').innerHTML = html;
        }
        
        renderWatchlist();
        fetchExpirations();
    </script>
</body>
</html>
