<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Terminal - Option Screener</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        .header {
            background: #161b22;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .nav { display: flex; gap: 16px; }
        .nav a { color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px; }
        .nav a.active { background: #21262d; color: #e6edf3; }
        
        .toolbar {
            background: #161b22;
            padding: 12px 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            border-bottom: 1px solid #30363d;
            flex-wrap: wrap;
        }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-size: 12px; color: #8b949e; text-transform: uppercase; }
        
        .search {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 8px 12px;
            border-radius: 6px;
            width: 100px;
        }
        .filter-input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 6px 8px;
            border-radius: 4px;
            width: 80px;
            font-size: 13px;
        }
        
        .btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #2ea043; }
        .btn-secondary { background: #21262d; border: 1px solid #30363d; color: #e6edf3; }
        .btn-secondary:hover { background: #30363d; }
        
        .omain { padding: 24px; }
        
        .results-container { background: #161b22; border-radius: 8px; overflow: hidden; }
        .results-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .results-table th { padding: 12px 8px; background: #21262d; color: #8b949e; text-align: left; font-weight: 600; border-bottom: 1px solid #30363d; cursor: pointer; }
        .results-table th:hover { color: #e6edf3; }
        .results-table td { padding: 10px 8px; border-bottom: 1px solid #21262d; }
        .results-table tr:hover td { background: #21262d; }
        
        .type-call { color: #3fb950; font-weight: 600; }
        .type-put { color: #f85149; font-weight: 600; }
        
        .loading { padding: 40px; text-align: center; color: #8b949e; }
        .count-bar { margin-bottom: 12px; font-size: 14px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <h1>🛠️ Alpha Terminal</h1>
            <div class="time" id="time" style="color: #8b949e; font-size: 14px;">--:--:--</div>
        </div>
        <div class="nav" style="display: flex; gap: 16px; margin-left: auto;">
            <a href="dashboard.html" style="color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px;">Dashboard</a>
            <a href="omon.html" style="color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px;">OMON</a>
            <a href="screener.html" class="active" style="background: #21262d; color: #e6edf3; text-decoration: none; padding: 8px 16px; border-radius: 6px;">Option Screener</a>
            <a href="ratio.html" style="color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px;">Ratio Analysis</a>
            <a href="financials.html" style="color: #8b949e; text-decoration: none; padding: 8px 16px; border-radius: 6px;">Financial Analyzer</a>
            <a href="estimates.html">Earnings Estimates</a>
        </div>
    </div>
    
    <div class="toolbar">
        <div class="filter-group">
            <label>Ticker</label>
            <input type="text" class="search" id="ticker" placeholder="SPY" value="SPY">
        </div>
        
        <div class="filter-group">
            <label>Min Vol</label>
            <input type="number" class="filter-input" id="minVol" value="100">
        </div>
        
        <div class="filter-group">
            <label>Min OI</label>
            <input type="number" class="filter-input" id="minOI" value="0">
        </div>

        <div class="filter-group">
            <label>Min IV%</label>
            <input type="number" class="filter-input" id="minIV" value="0">
        </div>

        <div class="filter-group">
            <label>Unusual (V>OI)</label>
            <input type="checkbox" id="unusualOnly">
        </div>
        
        <button class="btn" onclick="runScan()">Scan Market</button>
    </div>
    
    <div class="omain">
        <div class="count-bar" id="countBar">Results: 0</div>
        <div class="results-container" id="resultsContainer">
            <div class="loading">Enter ticker and click Scan to analyze first 8 expiries</div>
        </div>
    </div>
    
    <script>
        // Update time
        function updateTime() {
            const now = new Date();
            const timeEl = document.getElementById('time');
            if (timeEl) timeEl.textContent = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();

        let allData = [];
        let sortCol = 'vol';
        let sortAsc = false;

        async function runScan() {
            const ticker = document.getElementById('ticker').value.toUpperCase().trim();
            if (!ticker) return;
            
            document.getElementById('resultsContainer').innerHTML = '<div class="loading">Scanning first 8 expirations (this may take 10-15 seconds)...</div>';
            
            try {
                const res = await fetch(`http://localhost:9098/api/screen?ticker=${ticker}`);
                const data = await res.json();
                allData = data.results || [];
                applyFilters();
            } catch (e) {
                console.error(e);
                document.getElementById('resultsContainer').innerHTML = '<div class="loading">Error during scan: ' + e.message + '</div>';
            }
        }

        function applyFilters() {
            const minVol = parseInt(document.getElementById('minVol').value) || 0;
            const minOI = parseInt(document.getElementById('minOI').value) || 0;
            const minIV = (parseFloat(document.getElementById('minIV').value) || 0) / 100;
            const unusualOnly = document.getElementById('unusualOnly').checked;

            let filtered = allData.filter(d => {
                if (d.vol < minVol) return false;
                if (d.oi < minOI) return false;
                if (d.iv < minIV) return false;
                if (unusualOnly && (d.vol <= d.oi)) return false;
                return true;
            });

            // Sort
            filtered.sort((a, b) => {
                let valA = a[sortCol];
                let valB = b[sortCol];
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });

            renderTable(filtered);
        }

        function renderTable(data) {
            document.getElementById('countBar').textContent = `Results: ${data.length}`;
            
            if (data.length === 0) {
                document.getElementById('resultsContainer').innerHTML = '<div class="loading">No matches found for these filters.</div>';
                return;
            }

            let html = `
                <table class="results-table">
                    <thead>
                        <tr>
                            <th onclick="setSort('expiry')">Expiry</th>
                            <th onclick="setSort('strike')">Strike</th>
                            <th onclick="setSort('type')">Type</th>
                            <th onclick="setSort('last')">Last</th>
                            <th onclick="setSort('vol')">Vol</th>
                            <th onclick="setSort('oi')">OI</th>
                            <th onclick="setSort('iv')">IV</th>
                            <th onclick="setSort('delta')">Delta</th>
                            <th onclick="setSort('theta')">Theta</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(d => {
                html += `
                    <tr>
                        <td>${d.expiry}</td>
                        <td>${d.strike.toFixed(1)}</td>
                        <td class="type-${d.type.toLowerCase()}">${d.type}</td>
                        <td>$${d.last?.toFixed(2) || '-'}</td>
                        <td>${fmtNum(d.vol)}</td>
                        <td>${fmtNum(d.oi)}</td>
                        <td>${fmtPct(d.iv)}</td>
                        <td>${d.delta?.toFixed(3) || '-'}</td>
                        <td>${d.theta?.toFixed(3) || '-'}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            document.getElementById('resultsContainer').innerHTML = html;
        }

        function setSort(col) {
            if (sortCol === col) sortAsc = !sortAsc;
            else {
                sortCol = col;
                sortAsc = (col === 'expiry' || col === 'strike' || col === 'type');
            }
            applyFilters();
        }

        function fmtNum(n) {
            if (n == null || isNaN(n)) return '0';
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n;
        }
        
        function fmtPct(n) {
            if (n == null || isNaN(n)) return '-';
            return (n * 100).toFixed(1) + '%';
        }

        document.getElementById('ticker').addEventListener('keypress', e => {
            if (e.key === 'Enter') runScan();
        });
        
        // Auto-scan on load for demo
        window.addEventListener('DOMContentLoaded', () => {
            // Uncomment below to auto-scan on load:
            // runScan();
        });
    </script>
</body>
</html>
